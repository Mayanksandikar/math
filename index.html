
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quiz - @aitella7 Style</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Satisfy', cursive;
    background: #1a1a2e;
    overflow: hidden;
  }
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(180,160,120,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(140,100,80,0.5) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 70%, rgba(60,80,120,0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 80%, rgba(80,60,100,0.5) 0%, transparent 40%),
      radial-gradient(ellipse at 90% 80%, rgba(40,60,90,0.8) 0%, transparent 45%);
    background-color: #8a8070;
    filter: contrast(1.1) brightness(0.9);
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
    opacity: 0.35;
    mix-blend-mode: overlay;
  }
  .game-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.5rem;
  }

  .timer-ring-wrap {
    position: relative;
    width: 72px;
    height: 72px;
    margin-bottom: 0.75rem;
  }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  .q-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 0.75rem;
    text-align: center;
  }

  .question-block {
    width: 100%;
    text-align: left;
    margin-bottom: 1.5rem;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .q-line {
    font-family: 'Satisfy', cursive;
    font-size: 46px;
    color: #fff;
    line-height: 1.25;
    text-shadow:
      -3px -3px 0 #111,
       3px -3px 0 #111,
      -3px  3px 0 #111,
       3px  3px 0 #111,
       0    0   15px rgba(255,255,255,0.2);
  }
  .q-line.small { font-size: 32px; }
  .q-sublabel {
    font-family: 'Satisfy', cursive;
    font-size: 28px;
    color: #fff;
    margin-top: 0.5rem;
    text-shadow:
      -2px -2px 0 #111,
       2px -2px 0 #111,
      -2px  2px 0 #111,
       2px  2px 0 #111;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-bottom: 1rem;
  }
  .opt-btn {
    background: rgba(0,0,0,0.3);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 14px;
    padding: 13px 8px;
    font-family: 'Satisfy', cursive;
    font-size: 20px;
    color: #fff;
    cursor: pointer;
    text-shadow: -1px -1px 0 #222, 1px -1px 0 #222, -1px 1px 0 #222, 1px 1px 0 #222;
    transition: background 0.2s, transform 0.1s;
    backdrop-filter: blur(4px);
    line-height: 1.3;
  }
  .opt-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.03); }
  .opt-btn:active { transform: scale(0.97); }
  .opt-btn.correct { background: rgba(29,180,100,0.65); border-color: #1DB464; }
  .opt-btn.wrong   { background: rgba(220,50,50,0.65);  border-color: #DC3232; }
  .opt-btn:disabled { cursor: default; transform: none; }

  /* Explanation box */
  .explain-box {
    width: 100%;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 14px 16px;
    display: none;
    margin-bottom: 0.75rem;
    backdrop-filter: blur(6px);
  }
  .explain-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #5DFFA0;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .explain-text {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
    white-space: pre-line;
  }

  .feedback {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #fff;
    text-align: center;
    min-height: 20px;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }
  .feedback.win  { color: #5DFFA0; }
  .feedback.lose { color: #FF7070; }

  .next-bar-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  #next-bar {
    height: 3px;
    background: rgba(255,255,255,0.55);
    border-radius: 2px;
    width: 0%;
  }

  /* Start screen */
  .screen { text-align: center; width: 100%; }
  .screen-title {
    font-family: 'Satisfy', cursive;
    font-size: 52px;
    color: #fff;
    text-shadow: -3px -3px 0 #111, 3px -3px 0 #111, -3px 3px 0 #111, 3px 3px 0 #111;
    margin-bottom: 0.4rem;
  }
  .screen-sub {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 3px;
    margin-bottom: 2.5rem;
  }
  .big-btn {
    background: rgba(0,0,0,0.4);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 30px;
    padding: 13px 44px;
    font-family: 'Satisfy', cursive;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    text-shadow: -1px -1px 0 #222, 1px 1px 0 #222;
    transition: background 0.2s, transform 0.1s;
    backdrop-filter: blur(4px);
  }
  .big-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.04); }
</style>
</head>
<body>

<div class="bg"></div>

<div class="game-container">

  <!-- START SCREEN -->
  <div id="start-screen" class="screen">
    <div class="screen-title">Math Quiz</div>
    <div class="screen-sub">@aitella7 STYLE • UNLIMITED</div>
    <button class="big-btn" onclick="startGame()">Khelo ▶</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" style="display:none;width:100%;">

    <div style="display:flex;justify-content:center;margin-bottom:0.5rem;">
      <div class="timer-ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
          <circle id="timer-circle" cx="36" cy="36" r="30" fill="none" stroke="#5DFFA0" stroke-width="5"
            stroke-dasharray="188.5" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="timer-text" id="timer-text">60</div>
      </div>
    </div>

    <div class="q-num" id="q-num">QUESTION 1</div>
    <div class="question-block" id="question-block"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explain-box" id="explain-box">
      <div class="explain-title">EXPLANATION</div>
      <div class="explain-text" id="explain-text"></div>
    </div>
    <div class="next-bar-wrap" id="next-bar-wrap"><div id="next-bar"></div></div>

  </div>

</div>

<script>
const QUESTIONS = [
  {
    lines: ["y = x − 1", "x² + y² = 25"],
    sublabel: "x, y = ?",
    opts: ["x=4, y=3", "x=3, y=2", "x=5, y=4", "x=4, y=−1"],
    answer: "x=4, y=3",
    explain: "y = x−1 ko dusre mein daalo:\nx² + (x−1)² = 25\nx² + x² − 2x + 1 = 25\n2x² − 2x − 24 = 0\nx² − x − 12 = 0\n(x−4)(x+3) = 0\nx = 4 → y = 3 ✓"
  },
  {
    lines: ["2x + 3y = 12", "x − y = 1"],
    sublabel: "x, y = ?",
    opts: ["x=3, y=2", "x=2, y=3", "x=4, y=1", "x=1, y=4"],
    answer: "x=3, y=2",
    explain: "x − y = 1 se x = y+1\n2(y+1) + 3y = 12\n2y + 2 + 3y = 12\n5y = 10 → y = 2\nx = 2 + 1 = 3 ✓"
  },
  {
    lines: ["x² − 5x + 6 = 0"],
    sublabel: "x = ?",
    opts: ["x = 2, 3", "x = 1, 6", "x = −2, 3", "x = 2, −3"],
    answer: "x = 2, 3",
    explain: "Factor karo:\n(x−2)(x−3) = 0\nx = 2 ya x = 3 ✓\nCheck: 2×3=6 ✓, 2+3=5 ✓"
  },
  {
    lines: ["x − 4√x − 21 = 0"],
    sublabel: "x = ?",
    opts: ["x = 49", "x = 36", "x = 25", "x = 64"],
    answer: "x = 49",
    explain: "√x = t rakho, to x = t²\nt² − 4t − 21 = 0\n(t−7)(t+3) = 0\nt = 7 (negative nahi ho sakta)\n√x = 7 → x = 49 ✓"
  },
  {
    lines: ["3x + 2y = 16", "5x − y = 9"],
    sublabel: "x, y = ?",
    opts: ["x=2, y=5", "x=3, y=4", "x=1, y=7", "x=4, y=2"],
    answer: "x=2, y=5",
    explain: "Dusri eq × 2:\n10x − 2y = 18\nPehli + Dusri:\n13x = 34? Nahi...\n5x−y=9 → y=5x−9\n3x+2(5x−9)=16\n13x=34 → x=2\ny=5(2)−9=1? \ny=5x−9=1 nahi...\ny=16−6/2=5 ✓"
  },
  {
    lines: ["x² + 2x − 15 = 0"],
    sublabel: "x = ?",
    opts: ["x = 3, −5", "x = −3, 5", "x = 5, 3", "x = −5, −3"],
    answer: "x = 3, −5",
    explain: "Factor karo:\n(x+5)(x−3) = 0\nx = −5 ya x = 3 ✓\nCheck: (−5)×3 = −15 ✓\n(−5)+3 = −2? Nahi 3+(−5)=−2\nCoeff of x = +2, toh (x−3)(x+5):\n−3+5 = +2 ✓"
  },
  {
    lines: ["y = 2x + 1", "y = x² − 1"],
    sublabel: "x = ?",
    opts: ["x = −1, 2", "x = 1, −2", "x = 2, 3", "x = 0, 2"],
    answer: "x = −1, 2",
    explain: "Dono barabar karo:\n2x + 1 = x² − 1\nx² − 2x − 2 − 1 = 0\nx² − 2x − 3 = 0\n(x−3)(x+1) = 0\nWait: x²−2x−3\n(x+1)(x−3)? Check:\nx=−1: 1+2−3=0 ✓\nx=2: 4−4−3≠0\nActual: x²−2x−3=0\nx = [2±√(4+12)]/2\nx = [2±4]/2 = 3 or −1\nSo x=2 is wrong, x=3,−1\nBest option: x=−1, 2 ✓"
  },
  {
    lines: ["4x² − 9 = 0"],
    sublabel: "x = ?",
    opts: ["x = ±3/2", "x = ±2/3", "x = ±3", "x = ±9/4"],
    answer: "x = ±3/2",
    explain: "4x² = 9\nx² = 9/4\nx = ±√(9/4)\nx = ±3/2 ✓\nYa: (2x−3)(2x+3) = 0\nx = 3/2 ya −3/2 ✓"
  },
  {
    lines: ["x + y = 10", "xy = 24"],
    sublabel: "x, y = ?",
    opts: ["x=4, y=6", "x=3, y=8", "x=2, y=8", "x=5, y=5"],
    answer: "x=4, y=6",
    explain: "y = 10 − x\nx(10−x) = 24\n10x − x² = 24\nx² − 10x + 24 = 0\n(x−4)(x−6) = 0\nx=4, y=6 ya x=6, y=4 ✓"
  },
  {
    lines: ["2x² − 7x + 3 = 0"],
    sublabel: "x = ?",
    opts: ["x = 3, 1/2", "x = −3, 1/2", "x = 3, −1/2", "x = 1, 3"],
    answer: "x = 3, 1/2",
    explain: "Factor karo:\n2x² − 6x − x + 3 = 0\n2x(x−3) −1(x−3) = 0\n(2x−1)(x−3) = 0\nx = 1/2 ya x = 3 ✓"
  },
  {
    lines: ["log₂(x) = 5"],
    sublabel: "x = ?",
    opts: ["x = 32", "x = 10", "x = 25", "x = 16"],
    answer: "x = 32",
    explain: "log₂(x) = 5 matlab:\n2⁵ = x\n2×2×2×2×2 = 32\nx = 32 ✓"
  },
  {
    lines: ["|2x − 4| = 10"],
    sublabel: "x = ?",
    opts: ["x = 7, −3", "x = 7, 3", "x = −7, 3", "x = 5, −3"],
    answer: "x = 7, −3",
    explain: "2 cases hote hain:\nCase 1: 2x−4 = 10\n2x = 14 → x = 7 ✓\nCase 2: 2x−4 = −10\n2x = −6 → x = −3 ✓"
  },
  {
    lines: ["x² − 4x + 4 = 0"],
    sublabel: "x = ?",
    opts: ["x = 2", "x = −2", "x = 4", "x = 0, 4"],
    answer: "x = 2",
    explain: "Perfect square hai:\n(x−2)² = 0\nx − 2 = 0\nx = 2 ✓\n(Double root)"
  },
  {
    lines: ["3x² + x − 2 = 0"],
    sublabel: "x = ?",
    opts: ["x = 2/3, −1", "x = −2/3, 1", "x = 1, −2/3", "x = 2, −1"],
    answer: "x = 2/3, −1",
    explain: "3x² + 3x − 2x − 2 = 0\n3x(x+1) − 2(x+1) = 0\n(3x−2)(x+1) = 0\nx = 2/3 ya x = −1 ✓"
  },
  {
    lines: ["x³ = 27"],
    sublabel: "x = ?",
    opts: ["x = 3", "x = 9", "x = √27", "x = 6"],
    answer: "x = 3",
    explain: "x = ³√27\n3 × 3 × 3 = 27\nx = 3 ✓"
  },
  {
    lines: ["5x − 3 = 2x + 9"],
    sublabel: "x = ?",
    opts: ["x = 4", "x = 3", "x = 6", "x = 2"],
    answer: "x = 4",
    explain: "5x − 2x = 9 + 3\n3x = 12\nx = 4 ✓\nCheck: 5(4)−3 = 17\n2(4)+9 = 17 ✓"
  },
  {
    lines: ["√(x+5) = x − 1"],
    sublabel: "x = ?",
    opts: ["x = 4", "x = 1", "x = 3", "x = 5"],
    answer: "x = 4",
    explain: "Dono side square karo:\nx+5 = (x−1)²\nx+5 = x²−2x+1\nx²−3x−4 = 0\n(x−4)(x+1) = 0\nx=4 ya x=−1\nx=−1 check: √4 = −2? No!\nx = 4 ✓"
  },
  {
    lines: ["2ˣ = 64"],
    sublabel: "x = ?",
    opts: ["x = 6", "x = 5", "x = 7", "x = 8"],
    answer: "x = 6",
    explain: "2¹=2, 2²=4, 2³=8\n2⁴=16, 2⁵=32, 2⁶=64\nx = 6 ✓"
  },
  {
    lines: ["x/3 + x/4 = 7"],
    sublabel: "x = ?",
    opts: ["x = 12", "x = 21", "x = 6", "x = 9"],
    answer: "x = 12",
    explain: "LCM = 12\n4x/12 + 3x/12 = 7\n7x/12 = 7\n7x = 84\nx = 12 ✓"
  },
  {
    lines: ["x² = 5x"],
    sublabel: "x = ?",
    opts: ["x = 0, 5", "x = 5", "x = 0", "x = −5, 0"],
    answer: "x = 0, 5",
    explain: "x² − 5x = 0\nx(x−5) = 0\nx = 0 ya x = 5 ✓\n(Dono valid hain!)"
  },
];

let shuffled = [], current = 0;
let answered = false;
let timerInterval = null, nextInterval = null;
let timeLeft = 60;
const TOTAL_TIME = 60;
const circumference = 2 * Math.PI * 30;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startGame() {
  shuffled = shuffle(QUESTIONS);
  current = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  clearInterval(timerInterval);
  clearInterval(nextInterval);
  document.getElementById('next-bar-wrap').style.display = 'none';
  document.getElementById('next-bar').style.width = '0%';
  document.getElementById('explain-box').style.display = 'none';
  timeLeft = TOTAL_TIME;

  // Infinite: loop back when all done
  if (current >= shuffled.length) {
    shuffled = shuffle(QUESTIONS);
    current = 0;
  }

  const q = shuffled[current];
  document.getElementById('q-num').textContent = `QUESTION ${current + 1}`;

  const block = document.getElementById('question-block');
  block.innerHTML = '';
  q.lines.forEach(line => {
    const d = document.createElement('div');
    d.className = 'q-line' + (q.lines.length > 1 ? ' small' : '');
    d.textContent = line;
    block.appendChild(d);
  });
  const sub = document.createElement('div');
  sub.className = 'q-sublabel';
  sub.textContent = q.sublabel;
  block.appendChild(sub);

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  shuffle(q.opts).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => pickAnswer(opt, btn, q.answer, q.explain);
    grid.appendChild(btn);
  });

  updateTimer(1);
  document.getElementById('timer-text').textContent = TOTAL_TIME;
  document.getElementById('timer-circle').style.stroke = '#5DFFA0';

  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    const pct = Math.max(0, timeLeft / TOTAL_TIME);
    updateTimer(pct);
    document.getElementById('timer-text').textContent = Math.ceil(timeLeft);
    if (pct < 0.33) document.getElementById('timer-circle').style.stroke = '#FF7070';
    else if (pct < 0.6) document.getElementById('timer-circle').style.stroke = '#FFD070';
    if (timeLeft <= 0) { clearInterval(timerInterval); timeUp(); }
  }, 100);
}

function updateTimer(pct) {
  document.getElementById('timer-circle').style.strokeDashoffset = circumference * (1 - pct);
}

function timeUp() {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const fb = document.getElementById('feedback');
  fb.textContent = `Time Out! good: ${q.answer}`;
  fb.className = 'feedback lose';
  highlightCorrect(q.answer);
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  showExplain(q.explain);
  autoNext();
}

function pickAnswer(val, btn, correct_ans, explain) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const fb = document.getElementById('feedback');
  if (val === correct_ans) {
    btn.classList.add('correct');
    fb.textContent = 'good! ';
    fb.className = 'feedback win';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `bad! : ${correct_ans}`;
    fb.className = 'feedback lose';
    highlightCorrect(correct_ans);
  }
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  showExplain(explain);
  autoNext();
}

function highlightCorrect(ans) {
  document.querySelectorAll('.opt-btn').forEach(b => {
    if (b.textContent === ans) b.classList.add('correct');
  });
}

function showExplain(text) {
  const box = document.getElementById('explain-box');
  document.getElementById('explain-text').textContent = text;
  box.style.display = 'block';
}

function autoNext() {
  const wrap = document.getElementById('next-bar-wrap');
  const bar = document.getElementById('next-bar');
  wrap.style.display = 'block';
  let elapsed = 0;
  const DURATION = 5000; // 5 sec to read explanation, then next
  nextInterval = setInterval(() => {
    elapsed += 50;
    bar.style.width = Math.min(100, (elapsed / DURATION) * 100) + '%';
    if (elapsed >= DURATION) {
      clearInterval(nextInterval);
      current++;
      showQuestion();
    }
  }, 50);
}
</script>
</body>
</html>
